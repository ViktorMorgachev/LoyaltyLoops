      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - $ref: '#/components/parameters/TimezoneHeader'
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CalculateTransactionRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransactionCalculationDto' }
        '403': { description: Forbidden }

