ktor {
    deployment {
        port = 8080
        port = ${?PORT}
        host = "0.0.0.0"
    }
    application {
        modules = [ io.loyaltyloop.server.ApplicationKt.module ]
    }
}

storage {
    driverClassName = "org.postgresql.Driver"
    jdbcUrl = "jdbc:postgresql://localhost:5432/loyalty_db"
    jdbcUrl = ${?JDBC_DATABASE_URL}

    user = "loyalty_user"
    user = ${?JDBC_DATABASE_USERNAME}

    password = "loyalty_password"
    password = ${?JDBC_DATABASE_PASSWORD}
}

sms {
    # Главный переключатель: 'console' или 'prelude' (деньги)
    smsProvider = "prelude"
    smsProvider = ${?SMS_PROVIDER}

    prelude_conf {
            apiKey = "sk_vbVXwmxLQxL8akv6svgIEY3umEyfmJUb"
            apiKey = ${?PRELUDE_API_KEY}
    }
}

jwt {
    # Секрет шифрования. В проде обязательно переопределить через ENV!
       secret = "e2d7ad2010aa7d52b6cf70b41c6dc65bd7f3497c8d721439a0e823209d474ba0"
       secret = ${?JWT_SECRET}

       # Кто выдал токен. Локально localhost, в проде - ваш домен (https://...)
       issuer = "http://localhost:8080/"
       issuer = ${?JWT_ISSUER}

       # Для кого токен. Обычно совпадает с issuer или просто домен API
       audience = "http://localhost:8080/"
       audience = ${?JWT_AUDIENCE}

       realm = "Access to LoyaltyLoop"

       # 1 час
       accessLifetime = 3600000
       accessLifetime = ${?JWT_ACCESS_LIFETIME}

       # 30 дней
       refreshLifetime = 2592000000
       refreshLifetime = ${?JWT_REFRESH_LIFETIME}
}

otp {
    ttl = 120000
}

admin {
    superUserPhone = "+996554190030"
    defaultPin = "0000"
    defaultPin = ${?ADMIN_DEFAULT_PIN}
    forcePartnerPin = ${?ADMIN_FORCE_PARTNER_PIN}
}

features {
    enableTestSupport = true
    enableTestSupport = ${?FEATURE_TEST_SUPPORT}
    pushEnabled = true
    pushEnabled = ${?FEATURE_PUSH}
    enableSwagger = false
    enableSwagger = ${?FEATURE_ENABLE_SWAGGER}
    rating {
        enableCooldown = true
        enableCooldown = ${?FEATURE_RATING_ENABLE_COOLDOWN}
    }
}

platform {
    managerInviteCode = "SECRET123"
    managerInviteCode = ${?PLATFORM_MANAGER_INVITE}
}

# Rating weights (defaults, can be overridden via env: RATING_TAGS_CLIENT_<TAG>, RATING_TAGS_SERVICE_<TAG>)
rating {
  tags {
    client {
      ABUSE = ${?RATING_TAGS_CLIENT_ABUSE} ?: -2.0
      AGGRESSION = ${?RATING_TAGS_CLIENT_AGGRESSION} ?: -1.0
      NO_PAYMENT = ${?RATING_TAGS_CLIENT_NO_PAYMENT} ?: -1.0
      FRAUD = ${?RATING_TAGS_CLIENT_FRAUD} ?: 0.0
      NONE = ${?RATING_TAGS_CLIENT_NONE} ?: 0.0
      TIP = ${?RATING_TAGS_CLIENT_TIP} ?: 1.5
      FRIENDLY = ${?RATING_TAGS_CLIENT_FRIENDLY} ?: 1.5
      POLITE = ${?RATING_TAGS_CLIENT_POLITE} ?: 1.0
    }
    service {
      RUDE_STAFF = ${?RATING_TAGS_SERVICE_RUDE_STAFF} ?: -2.0
      DIRTY = ${?RATING_TAGS_SERVICE_DIRTY} ?: -1.0
      SLOW = ${?RATING_TAGS_SERVICE_SLOW} ?: -1.0
      WAIT_TIME = ${?RATING_TAGS_SERVICE_WAIT_TIME} ?: -0.5
      PRICEY = ${?RATING_TAGS_SERVICE_PRICEY} ?: -0.5
      FRIENDLY = ${?RATING_TAGS_SERVICE_FRIENDLY} ?: 1.5
      TASTY = ${?RATING_TAGS_SERVICE_TASTY} ?: 1.0
      ATTENTIVE = ${?RATING_TAGS_SERVICE_ATTENTIVE} ?: 1.0
      FAST = ${?RATING_TAGS_SERVICE_FAST} ?: 0.5
      CLEAN = ${?RATING_TAGS_SERVICE_CLEAN} ?: 0.5
      COMFORT = ${?RATING_TAGS_SERVICE_COMFORT} ?: 0.5
    }
  }
}

app {
    webBaseUrl = "http://localhost:3000"
    webBaseUrl = ${?WEB_BASE_URL}

    version {
        android {
            code = 1v
            code = ${?ANDROID_VERSION_CODE}
            url = "https://play.google.com/store/apps/details?id=io.loyaltyloop.app"
            url = ${?ANDROID_STORE_URL}
            force = true
            force = ${?ANDROID_FORCE_UPDATE}
        }
        ios {
            code = 1
            code = ${?IOS_VERSION_CODE}
            url = "https://apps.apple.com/"
            url = ${?IOS_STORE_URL}
            force = false
            force = ${?IOS_FORCE_UPDATE}
        }
    }

    maps {
       defaultLat = 42.8746
       defaultLat = ${?MAP_DEFAULT_LAT}
       defaultLon = 74.5698
       defaultLon = ${?MAP_DEFAULT_LON}
       minRadiusMeters = 50
       minRadiusMeters = ${?MAP_MIN_RADIUS}
       defaultRadiusMeters = 2000
       defaultRadiusMeters = ${?MAP_DEFAULT_RADIUS}
       maxRadiusMeters = 50000
       maxRadiusMeters = ${?MAP_MAX_RADIUS}
       clusterRadiusMeters = 80
       clusterRadiusMeters = ${?MAP_CLUSTER_RADIUS}
       searchDebounceMs = 350
       searchDebounceMs = ${?MAP_SEARCH_DEBOUNCE}
       showRatings = true
       showRatings = ${?MAP_SHOW_RATINGS}
       showWorkingHours = true
       showWorkingHours = ${?MAP_SHOW_HOURS}

    }
}
platform {
    managerInviteCode = "SECRET123"
    managerInviteCode = ${?PLATFORM_MANAGER_INVITE}
}
