      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TradingPointDto' }

  /map/points/search:
    get:
      tags: [Map]
      summary: Поиск публичных точек рядом
      description: Требует авторизацию. Параметры lat/lon обязательны.
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: lat
          required: true
          schema: { type: number, format: double }
        - in: query
          name: lon
          required: true
          schema: { type: number, format: double }
        - in: query
          name: radius
          schema: { type: integer, default: 2000, description: "радиус в метрах" }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: query
          schema: { type: string, nullable: true }
        - in: query
          name: openNow
          schema: { type: boolean, default: false }
        - in: query
          name: includeInactive
          schema: { type: boolean, default: false }
        - in: query
          name: minRating
          schema: { type: number, format: double, nullable: true, minimum: 0, maximum: 5 }
        - in: query
          name: type
          explode: true
          schema:
            type: array
            items: { type: string, description: "TradingPointType" }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TradingPointSearchResponse' }
              examples:
                default:
                  value:
                    total: 2
                    items:
                      - id: "point-1"
                        name: "Coffee Bar"
                        address: "Чуй 123"
                        latitude: 42.874
                        longitude: 74.612
                        rating: 4.8
                        ratingCount: 120
                        currency: "KGS"
                        partnerId: "partner-uuid"
                      - id: "point-2"
                        name: "Bakery"
                        address: "Абдымомунова 45"
                        latitude: 42.87
                        longitude: 74.61
                        rating: 4.5
                        ratingCount: 60
                        currency: "KGS"
                        partnerId: "partner-uuid"

