build:
  maxIssues: 0
  excludeCorrectable: false
  # weights влияют на счётчик только при maxIssues > 0; при 0 любой новый дефект и так валит сборку
  weights:
    complexity: 2
    LongParameterList: 1
    style: 1
    comments: 1

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true
  exclude:
    - 'DetektProgressListener'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'
    - 'FindingsReport'

output-reports:
  active: true
  exclude: []

style:
  MagicNumber:
    active: true
    # Числа в объявлениях свойств (varchar-длины в table objects, дефолты конфигов) — не магия
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreEnums: true
    ignoreRanges: true
    ignoreNumbers: ['-1', '0', '1', '2', '100', '1000']
  MaxLineLength:
    active: true
    maxLineLength: 140
    # Файлы локализаций — длинные строки переводов неизбежны
    excludes: ['**/i18n/**']
  WildcardImport:
    active: true
  TrailingWhitespace:
    active: true

complexity:
  TooManyFunctions:
    active: true
    # Дефолт для классов — 11; для backend route/service-файлов этого мало
    thresholdInClasses: 20
    thresholdInObjects: 20
    thresholdInEnums: 20
  LongMethod:
    active: true
    threshold: 120

exceptions:
  # Осознанное проглатывание — только с именем ignored/expected/_ (см. TD-020)
  SwallowedException:
    active: true
    allowedExceptionNameRegex: '_|(ignore|expected).*'
  TooGenericExceptionCaught:
    active: true
    allowedExceptionNameRegex: '_|(ignore|expected).*'

comments:
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicClass:
    active: false

coroutines:
  GlobalCoroutineUsage:
    active: true

