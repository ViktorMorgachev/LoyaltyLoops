ktor {
    deployment {
        port = 8080
        port = ${?PORT} # Если есть переменная PORT, берем её (для Прода)
    }
    application {
        modules = [ io.loyaltyloop.server.ApplicationKt.module ]
    }
}

# Наши настройки базы данных
storage {
    driverClassName = "org.postgresql.Driver"
    # По умолчанию (Dev)
    jdbcUrl = "jdbc:postgresql://localhost:5432/loyalty_db"
    jdbcUrl = ${?JDBC_DATABASE_URL} # В Проде подставим сюда реальный URL

    user = "loyalty_user"
    user = ${?JDBC_DATABASE_USERNAME}

    password = "loyalty_password"
    password = ${?JDBC_DATABASE_PASSWORD}
}

jwt {
    secret = "secret_key_change_me_in_prod" # Секретный ключ подписи
    issuer = "http://0.0.0.0:8080/"
    audience = "http://0.0.0.0:8080/hello"
    realm = "Access to LoyaltyLoop"

    # Время жизни (в миллисекундах)
    accessLifetime = 3600000      # 1 час (60 * 60 * 1000)
    refreshLifetime = 2592000000  # 30 дней (30 * 24 * 60 * 60 * 1000)
}

otp {
    ttl = 120000 # Время жизни кода в мс (2 минуты = 120 * 1000)
}

# ...
admin {
   superUserPhone = "+996554190030"
       # Дефолтный ПИН для первого входа (нужно будет сменить)
       # Хэш от "0000" (например) или просто 0000 для MVP, если мы храним не хэш пока
       defaultPin = "0000"
}