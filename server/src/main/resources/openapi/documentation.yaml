openapi: 3.0.3
info:
  title: LoyaltyLoops API
  description: API for LoyaltyLoops Multiplatform Application (Web Admin + Mobile App)
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    WorkspaceIdHeader:
      name: X-Workspace-Id
      in: header
      required: true
      description: >
        ID текущего рабочего пространства.
        Для владельца/менеджера — PartnerId,
        для кассира — TradingPointId.
      schema:
        type: string
    TimezoneHeader:
      name: X-Timezone-Id
      in: header
      required: false
      description: "Часовой пояс клиента, например Asia/Bishkek (используется в терминале и аналитике)"
      schema:
        type: string
  
  schemas:
    # --- COMMON ---
    ApiMessage:
      type: object
      properties:
        message: { type: string }

    JoinPlatformAdminRequest:
      type: object
      properties:
        inviteCode:
          type: string

    CreatePlatformRequest:
      type: object
      required: [type, targetPointId]
      properties:
        type: { type: string, enum: [ACTIVATE_POINT, BLOCK_PARTNER, UNBLOCK_PARTNER] }
        targetPointId: { type: string }
        amount: { type: number, format: double, nullable: true }
        duration: { type: string, enum: [DAY_1, DAY_3, WEEK_2, MONTH_1, MONTH_3, MONTH_6, YEAR_1, YEAR_2, YEAR_3, YEAR_5], nullable: true }
        isTrial: { type: boolean, default: false }
        blockReason: { type: string, nullable: true }

    PlatformRequestDto:
      type: object
      properties:
        id: { type: string }
        type: { type: string }
        status: { type: string }
        requesterId: { type: string }
        requesterName: { type: string, nullable: true }
        requesterPhone: { type: string, nullable: true }
        approverId: { type: string, nullable: true }
        approverName: { type: string, nullable: true }
        createdAt: { type: integer, format: int64 }
        updatedAt: { type: integer, format: int64 }
        targetPartnerId: { type: string }
        targetPartnerName: { type: string, nullable: true }
        targetPointId: { type: string, nullable: true }
        targetPointName: { type: string, nullable: true }
        currency: { type: string, nullable: true }
        amount: { type: number, format: double, nullable: true }
        duration: { type: string, nullable: true }
        isTrial: { type: boolean }
        blockReason: { type: string, nullable: true }
        rejectReason: { type: string, nullable: true }

    RejectRequestDto:
      type: object
      required: [reason]
      properties:
        reason: { type: string }

    SubscriptionWarningDto:
      type: object
      properties:
        partnerId: { type: string }
        partnerName: { type: string }
        pointId: { type: string }
        pointName: { type: string }
        endDate: { type: integer, format: int64 }

    # --- ANALYTICS & RATINGS ---
    AnalyticsResponse:
      type: object
      properties:
        totalRevenue: { type: number, format: double, example: 12345.67 }
        totalTransactions: { type: integer, example: 128 }
        averageCheck: { type: number, format: double, example: 96.4 }
        chartData:
          type: array
          items:
            type: object
            properties:
              date: { type: string, example: "2025-12-22" }
              revenue: { type: number, format: double, example: 2500.0 }
              transactionsCount: { type: integer, example: 14 }

    ReviewSummaryDto:
      type: object
      properties:
        avgRating: { type: number, format: double, example: 4.6 }
        totalReviews: { type: integer, example: 320 }
        stars:
          type: array
          items:
            type: object
            properties:
              stars: { type: integer, example: 5 }
              count: { type: integer, example: 210 }

    ServiceReviewDto:
      type: object
      properties:
        id: { type: string }
        partnerId: { type: string }
        tradingPointId: { type: string, nullable: true }
        userId: { type: string }
        rating: { type: integer, example: 5 }
        comment: { type: string, nullable: true, example: "Отличный сервис!" }
        createdAt: { type: integer, format: int64 }

    ClientRatingDto:
      type: object
      properties:
        id: { type: string }
        partnerId: { type: string }
        tradingPointId: { type: string }
        cashierId: { type: string }
        userId: { type: string }
        score: { type: integer, example: 4 }
        reason: { type: string, nullable: true, example: "Вежливый клиент" }
        createdAt: { type: integer, format: int64 }

    CashierDailyStatsDto:
      type: object
      properties:
        revenue: { type: number, format: double, example: 5400.0 }
        transactions: { type: integer, example: 32 }

    # --- SUPPORT ---
    SupportMessageDto:
      type: object
      properties:
        id: { type: string }
        senderId: { type: string }
        isFromPartner: { type: boolean }
        content: { type: string, example: "Нужна помощь с тарифом" }
        createdAt: { type: integer, format: int64 }
    SupportThreadDto:
      type: object
      properties:
        id: { type: string }
        partnerId: { type: string }
        partnerName: { type: string, nullable: true }
        lastMessageSnippet: { type: string, nullable: true }
        lastMessageAt: { type: integer, format: int64, nullable: true }
        unreadForPartner: { type: integer }
        unreadForAdmin: { type: integer }
        isClosed: { type: boolean }
        createdAt: { type: integer, format: int64 }
    SupportThreadResponse:
      type: object
      properties:
        thread: { $ref: '#/components/schemas/SupportThreadDto' }
        messages:
          type: array
          items: { $ref: '#/components/schemas/SupportMessageDto' }

    # --- MAP ---
    TradingPointSearchResponse:
      type: object
      properties:
        total: { type: integer, example: 42 }
        items:
          type: array
          items: { $ref: '#/components/schemas/TradingPointDto' }

    # --- AUTH & USERS ---
    UserDto:
      type: object
      properties:
        id: { type: string }
        phoneNumber: { type: string }
        countryCode: { type: string }
        firstName: { type: string, nullable: true }
        lastName: { type: string, nullable: true }
        email: { type: string, nullable: true }
        qrSecret: { type: string }
        language: { type: string }

    UserWorkspace:
      type: object
      properties:
        id: { type: string, description: PartnerID or PointID }
        title: { type: string }
        role: { type: string, enum: [CLIENT, CASHIER, PARTNER_ADMIN, PARTNER_MANAGER, PLATFORM_SUPER_ADMIN, PLATFORM_MANAGER] }
        requirePin: { type: boolean }

    AuthResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        userId: { type: string }
        isNewUser: { type: boolean }
        workspaces: 
          type: array
          items: 
            $ref: '#/components/schemas/UserWorkspace'
        qrSecret: { type: string }

    SendCodeRequest:
      type: object
      properties:
        phone: { type: string }

    SendCodeResponse:
      type: object
      properties:
        status: { type: string }
        debugCode: { type: string }

    VerifyCodeRequest:
      type: object
      properties:
        phone: { type: string }
        code: { type: string }

    RefreshTokenRequest:
      type: object
      properties:
        refreshToken: { type: string }

    VerifyPinRequest:
      type: object
      properties:
        workspaceId: { type: string }
        pin: { type: string }

    UserProfileResponse:
      type: object
      properties:
        userId: { type: string }
        phone: { type: string }
        countryCode: { type: string }
        firstName: { type: string, nullable: true }
        lastName: { type: string, nullable: true }
        email: { type: string, nullable: true }
        language: { type: string }
        workspaces: 
          type: array
          items: { $ref: '#/components/schemas/UserWorkspace' }
        isFrozenUntil:
          type: integer
          format: int64
          nullable: true
          description: "Timestamp (ms) until which account is frozen"

    UpdateProfileRequest:
      type: object
      properties:
        firstName: { type: string }
        email: { type: string, nullable: true }

    # --- PARTNER & POINTS ---
    PartnerEntity:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        countryCode: { type: string }
        hasPin: { type: boolean }
        status: { type: string, enum: [PENDING, ACTIVE, BLOCKED] }
        logoUrl: { type: string, nullable: true }
        color: { type: string }
        burnBonusesDays: { type: integer, nullable: true }
        downgradeTierDays: { type: integer, nullable: true }
        defaultVisitsTarget: { type: integer }
        ownerPhone: { type: string, nullable: true }

    CreatePartnerRequest:
      type: object
      required: [businessName, ownerPin]
      properties:
        businessName: { type: string }
        countryCode:
          type: string
          enum: [KG, KZ, UZ, BY]
          default: KG
        ownerPin:
          type: string
          description: "Owner PIN (4-12 digits)"

    UpdatePartnerRequest:
      type: object
      properties:
        businessName: { type: string }
        color: { type: string }
        logoUrl: { type: string }
        burnBonusesDays: { type: integer, nullable: true }
        downgradeTierDays: { type: integer, nullable: true }
        defaultVisitsTarget: { type: integer, default: 10 }

    UpdatePinRequest:
      type: object
      required: [newPin]
      properties:
        currentPin:
          type: string
          nullable: true
        newPin:
          type: string
          description: "New PIN (4-12 digits)"

    ResetPinRequest:
      type: object
      required: [confirm]
      properties:
        confirm: { type: boolean }

    PinResetConfirmRequest:
      type: object
      required: [token, newPin]
      properties:
        token:
          type: string
          description: "Token from the reset email link"
        newPin:
          type: string
          description: "New PIN (4-12 digits)"

    SupportThreadDto:
      type: object
      properties:
        id: { type: string }
        partnerId: { type: string }
        partnerName: { type: string }
        lastMessageSnippet: { type: string, nullable: true }
        lastMessageAt: { type: integer, format: int64, nullable: true }
        unreadForPartner: { type: integer }
        unreadForAdmin: { type: integer }
        isClosed: { type: boolean }

    SupportMessageDto:
      type: object
      properties:
        id: { type: string }
        threadId: { type: string }
        senderId: { type: string }
        senderRole: { type: string, enum: [CLIENT, CASHIER, PARTNER_ADMIN, PARTNER_MANAGER, PLATFORM_SUPER_ADMIN, PLATFORM_MANAGER] }
        content: { type: string }
        createdAt: { type: integer, format: int64 }
        isFromPartner: { type: boolean }

    SupportThreadResponse:
      type: object
      properties:
        thread:
          $ref: '#/components/schemas/SupportThreadDto'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/SupportMessageDto'

    SendSupportMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: "Message text"

    TradingPointDto:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        active: { type: boolean }
        type: { type: string, enum: [COFFEE_SHOP, RESTAURANT, RETAIL, SERVICE, OTHER] }
        address: { type: string, nullable: true }
        latitude: { type: number, format: double, nullable: true }
        longitude: { type: number, format: double, nullable: true }
        inviteCode: { type: string, nullable: true }
        currency: { type: string, default: 'KGS' }

    CreateTradingPointRequest:
      type: object
      required: [name, type, address, latitude, longitude, programType]
      properties:
        name: { type: string }
        type: { type: string, enum: [COFFEE_SHOP, RESTAURANT, RETAIL, SERVICE, OTHER] }
        address: { type: string }
        latitude: { type: number, format: double }
        longitude: { type: number, format: double }
        currency: { type: string, default: KGS }
        programType: { type: string, enum: [TIERED_LTV, VISIT_COUNTER, HYBRID] }
        visitsTarget:
          type: integer
          description: "Visit goal (defaults to partner setting if omitted)."
        baseCashback: { type: number, format: double, nullable: true }
        awardOnMixedPayment: { type: boolean, default: false }

    UpdateTradingPointRequest:
      type: object
      required: [name, type, address, latitude, longitude, settings]
      properties:
        name: { type: string }
        type: { type: string, enum: [COFFEE_SHOP, RESTAURANT, RETAIL, SERVICE, OTHER] }
        address: { type: string }
        latitude: { type: number, format: double }
        longitude: { type: number, format: double }
        currency: { type: string, default: KGS }
        settings:
          $ref: '#/components/schemas/UpdateLoyaltySettingsRequest'

    UpdateLoyaltySettingsRequest:
      type: object
      properties:
        programType: { type: string }
        visitsTarget:
          type: integer
          nullable: true
          description: "Deprecated. Visit goal is managed at business level."
        maxBurnPercentage: { type: integer }
        awardOnMixedPayment: { type: boolean, default: false }
        tiers:
          type: array
          items:
            $ref: '#/components/schemas/LoyaltyTierDto'

    LoyaltyTierDto:
      type: object
      properties:
        levelIndex: { type: integer }
        loyaltyTier:
          type: object
          properties:
            level: { type: string, enum: [Base, Silver, Gold] }
            descr: { type: string, nullable: true }
        threshold: { type: number, format: double }
        cashbackPercent: { type: number, format: double, description: 'Percentage (e.g. 5 = 5%)' }

    TradingPointDetailsDto:
      type: object
      properties:
        point: { $ref: '#/components/schemas/TradingPointDto' }
        settings: { $ref: '#/components/schemas/LoyaltySettingsDto' }

    LoyaltySettingsDto:
      type: object
      properties:
        settingsId: { type: string }
        programType: { type: string }
        visitsTarget: { type: integer }
        maxBurnPercentage: { type: integer }
        awardOnMixedPayment: { type: boolean, default: false }
        tiers: { type: array, items: { $ref: '#/components/schemas/LoyaltyTierDto' } }

    CashierDto:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        phone: { type: string }
        active: { type: boolean }
        tradingPointId: { type: string, nullable: true }
        pointName: { type: string, nullable: true }
        revenue: { type: number, format: double }
        transactionsCount: { type: integer }

    PartnerStatsDto:
      type: object
      properties:
        partnerId: { type: string }
        pointsCount: { type: integer }
        cardsCount: { type: integer }
        transactionsCount: { type: integer }

    ChangePartnerStatusRequest:
      type: object
      properties:
        status: { type: string, enum: [PENDING, ACTIVE, BLOCKED] }

    ChangePointStatusRequest:
      type: object
      properties:
        isActive: { type: boolean }

    # --- ANALYTICS ---
    AnalyticsResponse:
      type: object
      properties:
        totalRevenue: { type: number, format: double }
        totalTransactions: { type: integer }
        averageCheck: { type: number, format: double }
        chartData:
          type: array
          items:
            type: object
            properties:
              date: { type: string }
              revenue: { type: number, format: double }
              transactionsCount: { type: integer }

    # --- TERMINAL & TRANSACTIONS ---
    TransactionStrategy:
      type: string
      enum: [CHARGE, SPEND, VISIT]

    ScanQrRequest:
      type: object
      properties:
        qrContent: { type: string }
        tradingPointId: { type: string }

    ScanQrResponse:
      type: object
      properties:
        userId: { type: string }
        userPhone: { type: string }
        firstName: { type: string }
        cardId: { type: string }
        currentBalance: { type: number, format: double }
        visitsCount: { type: integer }
        programType: { type: string }
        visitsTarget: { type: integer }
        cashbackPercent: { type: number, format: double, nullable: true, description: 'Percentage (e.g. 5 = 5%)' }
        maxBurnPercentage: { type: integer }
        currency: { type: string }
        awardOnMixedPayment: { type: boolean }
        isNewCard: { type: boolean }

    CalculateTransactionRequest:
      type: object
      properties:
        tradingPointId: { type: string }
        cardId: { type: string }
        purchaseAmount: { type: number, format: double, default: 0.0 }
        strategy: { $ref: '#/components/schemas/TransactionStrategy' }

    TransactionCalculationDto:
      type: object
      properties:
        purchaseAmount: { type: number, format: double }
        pointsToSpend: { type: number, format: double }
        pointsToAward: { type: number, format: double }
        pointsSpent: { type: number, format: double }
        moneyPaid: { type: number, format: double }
        newBalance: { type: number, format: double }
        newVisits: { type: integer }
        message: { type: string }

    ProcessTransactionRequest:
      type: object
      properties:
        tradingPointId: { type: string }
        cardId: { type: string }
        purchaseAmount: { type: number, format: double }
        strategy: { $ref: '#/components/schemas/TransactionStrategy' }

    TransactionResult:
      type: object
      properties:
        cardId: { type: string }
        newBalance: { type: number, format: double }
        newVisits: { type: integer }
        message: { type: string }

    TransactionHistoryDto:
      type: object
      properties:
        id: { type: string }
        timestamp: { type: integer, format: int64 }
        pointName: { type: string }
        type: { type: string }
        amount: { type: number, format: double }
        pointsDelta: { type: number, format: double }
        visitsDelta: { type: integer }

    # --- CLIENT ---
    LoyaltyCardDto:
      type: object
      properties:
        id: { type: string }
        partnerName: { type: string }
        cardColor: { type: string }
        balance: { type: number }
        tierLevel: { type: integer }

    JoinTradingPointRequest:
      type: object
      properties:
        inviteCode: { type: string }

security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Client
  - name: Partner
  - name: Terminal
  - name: Admin
  - name: Platform

paths:
  # --- AUTH ---
  /auth/send-code:
    post:
      tags: [Auth]
      security: []
      summary: Send OTP code via SMS
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendCodeRequest' }
      responses:
        '200':
          description: Code sent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SendCodeResponse' }
        '400':
          description: Invalid Phone Number

  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Verify OTP and Login
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VerifyCodeRequest' }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401':
          description: Invalid or Expired Code

  /auth/refresh:
    post:
      tags: [Auth]
      security: []
      summary: Refresh Access Token
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshTokenRequest' }
      responses:
        '200':
          description: Tokens Refreshed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401':
          description: Invalid Refresh Token

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (Invalidate Refresh Token)
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshTokenRequest' }
      responses:
        '200': { description: Logged out }

  /auth/verify-pin:
    post:
      tags: [Auth]
      summary: Verify PIN for sensitive workspace access
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VerifyPinRequest' }
      responses:
        '200': { description: PIN Correct }
        '401': { description: Invalid PIN }

  /auth/users:
    get:
      tags: [Auth]
      summary: List all users (Debug)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/UserDto' }

  # --- CLIENT ---
  /client/profile:
    post:
      tags: [Client]
      summary: Update Profile
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProfileRequest' }
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiMessage' }
        '400':
          description: Validation Error (Invalid email, empty name)
        '401':
          description: Unauthorized

  /client/me:
    get:
      tags: [Client]
      summary: Get current user profile
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfileResponse' }
        '401':
          description: Unauthorized (Invalid Token)

  /client/cards:
    get:
      tags: [Client]
      summary: Get my loyalty cards
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LoyaltyCardDto' }
        '401':
          description: Unauthorized

  # --- PARTNER ---
  /partners/create:
    post:
      tags: [Partner]
      summary: Register new business
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePartnerRequest' }
      responses:
        '201':
          description: Business created
        '400':
          description: User already has a business or invalid data
        '401':
          description: Unauthorized

  /partners/pin:
    put:
      tags: [Partner]
      summary: Update owner PIN
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdatePinRequest' }
      responses:
        '200': { description: PIN updated }
        '400': { description: Invalid PIN payload }
        '403': { description: Forbidden (account frozen or current PIN mismatch) }
        '401': { description: Unauthorized }

  /partners/pin/reset:
    post:
      tags: [Partner]
      summary: Reset PIN immediately (manual confirmation)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResetPinRequest' }
      responses:
        '200': { description: PIN cleared and account frozen }
        '403': { description: Forbidden (confirmation missing) }
        '401': { description: Unauthorized }

  /partners/pin/reset/request:
    post:
      tags: [Partner]
      summary: Send PIN reset link via e-mail
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Reset link sent }
        '403': { description: Email not set or account frozen }
        '401': { description: Unauthorized }

  /partners/pin/reset/confirm:
    post:
      tags: [Partner]
      summary: Confirm PIN reset via e-mail token
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PinResetConfirmRequest' }
      responses:
        '200': { description: PIN updated and account frozen for 24h }
        '400': { description: Invalid token or PIN }
        '404': { description: Token not found }

  /partners/me:
    get:
      tags: [Partner]
      summary: Get my business details
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PartnerEntity' }
        '404':
          description: User has no business
    put:
      tags: [Partner]
      summary: Update business settings
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdatePartnerRequest' }
      responses:
        '200':
          description: Updated
        '400':
          description: Invalid Data

  /partners/analytics:
    get:
      tags: [Partner]
      summary: Получить аналитику по выручке/транзакциям
      description: Требуется X-Workspace-Id (PartnerId) и корректный timezone (X-Timezone-Id).
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - $ref: '#/components/parameters/TimezoneHeader'
        - in: query
          name: period
          schema: { type: string, enum: [WEEK, MONTH, SIX_MONTHS, YEAR], default: WEEK }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnalyticsResponse' }
              examples:
                week:
                  summary: Пример за неделю
                  value:
                    totalRevenue: 12345.67
                    totalTransactions: 128
                    averageCheck: 96.4
                    chartData:
                      - { date: "2025-12-16", revenue: 2100.0, transactionsCount: 12 }
                      - { date: "2025-12-17", revenue: 1800.0, transactionsCount: 10 }
                      - { date: "2025-12-18", revenue: 2400.0, transactionsCount: 14 }
                      - { date: "2025-12-19", revenue: 2600.0, transactionsCount: 15 }
                      - { date: "2025-12-20", revenue: 1900.0, transactionsCount: 11 }
                      - { date: "2025-12-21", revenue: 1500.0, transactionsCount: 9 }
                      - { date: "2025-12-22", revenue: 2045.67, transactionsCount: 9 }

