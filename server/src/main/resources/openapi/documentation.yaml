    post:
      tags: [Terminal]
      summary: Провести транзакцию (списание/начисление)
      description: Требуется X-Workspace-Id (TradingPointId). Выполняет запись в историю и возвращает результат для кассира/клиента.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - $ref: '#/components/parameters/TimezoneHeader'
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProcessTransactionRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransactionResult' }
        '400': { description: Logic Error }
        '403': { description: Forbidden }

