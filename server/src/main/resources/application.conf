ktor {
    deployment {
        port = 8080
        port = ${?PORT}
        host = "0.0.0.0"
    }
    application {
        modules = [ io.loyaltyloop.server.ApplicationKt.module ]
    }
}

storage {
    driverClassName = "org.postgresql.Driver"
    # По умолчанию для docker-compose используем host "db".
    # Локально можно переопределить через JDBC_DATABASE_URL на localhost.
    jdbcUrl = "jdbc:postgresql://db:5432/loyalty_db"
    jdbcUrl = ${?JDBC_DATABASE_URL}

    user = "loyalty_user"
    user = ${?JDBC_DATABASE_USERNAME}

    password = "loyalty_password"
    password = ${?JDBC_DATABASE_PASSWORD}
}

redis {
    url = ""
    url = ${?REDIS_URL}
    host = "localhost"
    host = ${?REDIS_HOST}
    port = 6379
    port = ${?REDIS_PORT}
    password = ""
    password = ${?REDIS_PASSWORD}
    timeout = 2000
    timeout = ${?REDIS_TIMEOUT}

    pool {
        maxTotal = 128
        maxTotal = ${?REDIS_POOL_MAX_TOTAL}
        maxIdle = 128
        maxIdle = ${?REDIS_POOL_MAX_IDLE}
        minIdle = 32
        minIdle = ${?REDIS_POOL_MIN_IDLE}

        testOnBorrow = false
        testOnBorrow = ${?REDIS_POOL_TEST_ON_BORROW}
        testOnReturn = false
        testOnReturn = ${?REDIS_POOL_TEST_ON_RETURN}
        testWhileIdle = true
        testWhileIdle = ${?REDIS_POOL_TEST_WHILE_IDLE}

        minEvictableIdleTimeMs = 60000
        minEvictableIdleTimeMs = ${?REDIS_POOL_MIN_EVICTABLE_IDLE_TIME_MS}
        timeBetweenEvictionRunsMs = 30000
        timeBetweenEvictionRunsMs = ${?REDIS_POOL_TIME_BETWEEN_EVICTION_RUNS_MS}
        numTestsPerEvictionRun = 32
        numTestsPerEvictionRun = ${?REDIS_POOL_NUM_TESTS_PER_EVICTION_RUN}

        blockWhenExhausted = true
        blockWhenExhausted = ${?REDIS_POOL_BLOCK_WHEN_EXHAUSTED}
        maxWaitMs = 2000
        maxWaitMs = ${?REDIS_POOL_MAX_WAIT_MS}

        jmxEnabled = true
        jmxEnabled = ${?REDIS_POOL_JMX_ENABLED}
    }
}

keys {
     exchangeRate = "df6d9301e22fdc18e7d90d01"
     exchangeRate = ${?EXCHANGE_RATE_API_KEY}
}

email {
    provider = "resend"

    # ВАЖНО: Пока нет своего домена, отправлять можно ТОЛЬКО с этого адреса
    fromAddress = "LoyaltyLoop <onboarding@resend.dev>"


    resend {
        apiKey = "re_5QnBd7sP_QBsnyc5fz3yt9YxgA89Lk29n" # Твой ключ
        isDev = true
        isDev = ${?RESEND_IS_DEV_MODE}
    }
}

sms {
    # Главный переключатель: 'console' или 'prelude' (деньги)
    smsProvider = "prelude"
    smsProvider = ${?SMS_PROVIDER}

    prelude_conf {
            apiKey = "sk_vbVXwmxLQxL8akv6svgIEY3umEyfmJUb"
            apiKey = ${?PRELUDE_API_KEY}
              isDev = true
              isDev = ${?PRELUDE_IS_DEV_MODE}
    }

    limits {
        perMinute = 1
        perMinute = ${?SMS_LIMIT_PER_MINUTE}
        perHour = 5
        perHour = ${?SMS_LIMIT_PER_HOUR}
        maxOtpAttempts = 3
        maxOtpAttempts = ${?SMS_LIMIT_MAX_OTP_ATTEMPTS}
        blockDurationMs = 3600000
        blockDurationMs = ${?SMS_LIMIT_BLOCK_MS}
    }
}

precheck {
    enabled = true
    enabled = ${?VPN_PRECHECK_ENABLED}
}

jwt {
    # Секрет шифрования. В проде обязательно переопределить через ENV!
       secret = "e2d7ad2010aa7d52b6cf70b41c6dc65bd7f3497c8d721439a0e823209d474ba0"
       secret = ${?JWT_SECRET}

       # Кто выдал токен. Локально localhost, в проде - ваш домен (https://...)
       issuer = "http://localhost:8080/"
       issuer = ${?JWT_ISSUER}

       # Для кого токен. Обычно совпадает с issuer или просто домен API
       audience = "http://localhost:8080/"
       audience = ${?JWT_AUDIENCE}

       realm = "Access to LoyaltyLoop"

       # 1 час
       accessLifetime = 3600000
       accessLifetime = ${?JWT_ACCESS_LIFETIME}

       # 30 дней
       refreshLifetime = 2592000000
       refreshLifetime = ${?JWT_REFRESH_LIFETIME}
}

otp {
    ttl = 120000
}

admin {
    superUserPhone = "+996554190030"
    defaultPin = "0000"
    defaultPin = ${?ADMIN_DEFAULT_PIN}
}

features {
    enableTestSupport = true
    enableTestSupport = ${?FEATURE_TEST_SUPPORT}
    pushEnabled = true
    pushEnabled = ${?FEATURE_PUSH}
    enableSwagger = false
    enableSwagger = ${?FEATURE_ENABLE_SWAGGER}
    rating {
        enableCooldown = true
        enableCooldown = ${?FEATURE_RATING_ENABLE_COOLDOWN}
    }
}

platform {
    managerInviteCode = "SECRET123"
    managerInviteCode = ${?PLATFORM_MANAGER_INVITE}
}

# Rating weights (defaults, can be overridden via env: RATING_TAGS_CLIENT_<TAG>, RATING_TAGS_SERVICE_<TAG>)
