server {
    listen 80;
    
    # Security headers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; require-trusted-types-for 'script'; upgrade-insecure-requests" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Сжатие (оставляем, это хорошо)
    gzip on;
    gzip_min_length 1000;
    gzip_types text/plain text/xml application/javascript text/css;

    root /usr/share/nginx/html;
    index index.html;

     # --- РЕДИРЕКТ СО СТАРОГО ДОМЕНА ---
     # Если кто-то зашел по ссылке с визитки (старый домен Railway)
     # ВАЖНО: Убедись, что написание домена точь-в-точь совпадает с тем, что дает Railway
     if ($host = "loyalityloop.up.railway.app") {
         return 301 https://loyaltyloops.app$request_uri;
     }
     # ----------------------------------

    # 1. Vite Assets (JS и CSS)
    # Vite добавляет хеш в имена файлов (напр. index-a1b2.js), поэтому их
    # МОЖНО и НУЖНО кешировать надолго. Это ускорит загрузку.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 2. Картинки и шрифты (оставляем как было)
    location ~* \.(?:jpg|jpeg|gif|png|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }

    # 3. APK файлы (для корректного скачивания на Android)
    location ~* \.apk$ {
        # Если файла нет, отдаём 404, а не index.html
        try_files $uri =404;

        types {
            application/vnd.android.package-archive apk;
        }
        default_type application/vnd.android.package-archive;

        # Явное скачивание и имя файла
        add_header Content-Disposition 'attachment; filename="$uri"';
        add_header Cache-Control "public, no-transform";
        expires 1h;
        access_log off;
    }

    location ^~ /.well-known/ {
            # Разрешаем доступ всем
            allow all;
            # Принудительно ставим тип контента JSON (чтобы Android был счастлив)
            default_type application/json;
            # Если файла нет - честно отдаем 404, а не React-приложение
            try_files $uri =404;
        }

    # 3. Главная точка входа (index.html)
    # Сюда попадают все запросы, которые не нашли файл выше.
    # ВАЖНО: Добавляем запрет кеширования!
    location / {
        try_files $uri $uri/ /index.html;
        access_log off;
        # Вот эта строка решает вашу проблему:
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}