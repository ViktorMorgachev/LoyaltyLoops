  # --- WEBSOCKETS ---
  # Подключение по протоколу websocket (ws://). Авторизация через query-параметр token.
  /ws/cards:
    get:
      tags: [WebSocket]
      summary: WebSocket уведомления по картам (реалтайм)
      description: |
        Подключение: `GET /ws/cards?token=<accessToken>`
        - token — Access Token (JWT) пользователя.
        - Односторонний стрим от сервера к клиенту. Клиентские сообщения игнорируются.
      parameters:
        - in: query
          name: token
          required: true
          schema: { type: string }
      responses:
        '101': { description: WebSocket Upgrade }

  /ws/support/partner:
    get:
      tags: [WebSocket]
      summary: WebSocket поддержки для партнёров (владелец/менеджер)
      description: |
        Подключение: `GET /ws/support/partner?token=<accessToken>[&partnerId=<PartnerId>]`
        - token — Access Token (JWT) пользователя.
        - partnerId — опционально, если нужно слушать конкретный бизнес; иначе берётся первый доступный.
        - Сообщения только на чтение; отправка идёт через REST (`/partners/support/messages`).
      parameters:
        - in: query
          name: token
          required: true
          schema: { type: string }
        - in: query
          name: partnerId
          required: false
          schema: { type: string }
      responses:
        '101': { description: WebSocket Upgrade }

  /ws/support/admin:
    get:
      tags: [WebSocket]
      summary: WebSocket поддержки для админов платформы
      description: |
        Подключение: `GET /ws/support/admin?token=<accessToken>`
        - token — Access Token (JWT) пользователя с ролью PLATFORM_*.
        - Админы получают все новые сообщения партнёров.
      parameters:
        - in: query
          name: token
          required: true
          schema: { type: string }
      responses:
        '101': { description: WebSocket Upgrade }

  # --- PLATFORM ---
  /platform/join:
    post:
      tags: [Platform]
      summary: Join platform staff via invite code
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JoinPlatformAdminRequest' }
      responses:
        '200': { description: Joined }
        '409': { description: Already joined }

  /platform/alerts:
    get:
      tags: [Platform]
      summary: Get expiring subscription alerts
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SubscriptionWarningDto' }

  /platform/requests:
    post:
      tags: [Platform]
      summary: Create a platform request (Activate Point, Block Partner)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePlatformRequest' }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
    get:
      tags: [Platform]
      summary: List platform requests
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [PENDING, APPROVED, REJECTED] }
        - in: query
          name: requesterId
          schema: { type: string }
        - in: query
          name: targetPartnerId
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PlatformRequestDto' }

  /platform/requests/{id}/approve:
    post:
      tags: [Platform]
      summary: Approve a request
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Approved }

  /platform/requests/{id}/reject:
    post:
      tags: [Platform]
      summary: Reject a request
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RejectRequestDto' }
      responses:
        '200': { description: Rejected }

  /platform/invite:
    post:
      tags: [Platform]
      summary: Invite new platform staff
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: role
          required: true
          schema: { type: string, enum: [PLATFORM_SUPER_MANAGER, PLATFORM_MANAGER] }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: string }

  /platform/staff:
    get:
      tags: [Platform]
      summary: List platform staff
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: role
          schema: { type: string, enum: [PLATFORM_SUPER_ADMIN, PLATFORM_SUPER_MANAGER, PLATFORM_MANAGER] }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object # Employer-like structure
                  properties:
                    id: { type: string }
                    userId: { type: string }
                    name: { type: string }
                    phone: { type: string }
                    pointName: { type: string, description: Role }

  /platform/staff/{id}:
    delete:
      tags: [Platform]
      summary: Fire platform staff member
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Deleted }
