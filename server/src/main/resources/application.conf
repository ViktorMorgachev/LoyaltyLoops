  tags {
   client {
         ABUSE = -2.0
         ABUSE = ${?RATING_TAGS_CLIENT_ABUSE}

         AGGRESSION = -1.0
         AGGRESSION = ${?RATING_TAGS_CLIENT_AGGRESSION}

         NO_PAYMENT = -1.0
         NO_PAYMENT = ${?RATING_TAGS_CLIENT_NO_PAYMENT}

         FRAUD = 0.0
         FRAUD = ${?RATING_TAGS_CLIENT_FRAUD}

         NONE = 0.0
         NONE = ${?RATING_TAGS_CLIENT_NONE}

         TIP = 1.5
         TIP = ${?RATING_TAGS_CLIENT_TIP}

         FRIENDLY = 1.5
         FRIENDLY = ${?RATING_TAGS_CLIENT_FRIENDLY}

         POLITE = 1.0
         POLITE = ${?RATING_TAGS_CLIENT_POLITE}
       }
    service {
          RUDE_STAFF = -2.0
          RUDE_STAFF = ${?RATING_TAGS_SERVICE_RUDE_STAFF}

          DIRTY = -1.0
          DIRTY = ${?RATING_TAGS_SERVICE_DIRTY}

          SLOW = -1.0
          SLOW = ${?RATING_TAGS_SERVICE_SLOW}

          WAIT_TIME = -0.5
          WAIT_TIME = ${?RATING_TAGS_SERVICE_WAIT_TIME}

          PRICEY = -0.5
          PRICEY = ${?RATING_TAGS_SERVICE_PRICEY}

          FRIENDLY = 1.5
          FRIENDLY = ${?RATING_TAGS_SERVICE_FRIENDLY}

          TASTY = 1.0
          TASTY = ${?RATING_TAGS_SERVICE_TASTY}

          ATTENTIVE = 1.0
