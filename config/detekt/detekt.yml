build:
  maxIssues: 0
  excludeCorrectable: false
  weights:
    complexity: 2
    LongParameterList: 1
    style: 1
    comments: 1

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true
  exclude:
    - 'DetektProgressListener'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'
    - 'FindingsReport'

output-reports:
  active: true
  exclude: []

style:
  MagicNumber:
    active: true
  MaxLineLength:
    active: true
    maxLineLength: 140
  WildcardImport:
    active: true
  TrailingWhitespace:
    active: true

complexity:
  TooManyFunctions:
    active: true
    thresholdInObjects: 20
  LongMethod:
    active: true
    threshold: 120

comments:
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicClass:
    active: false

coroutines:
  GlobalCoroutineUsage:
    active: true

