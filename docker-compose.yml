services:
  db:
    image: postgres:15-alpine
    container_name: loyalty_postgres
    restart: always
    environment:
      POSTGRES_USER: loyalty_user
      POSTGRES_PASSWORD: loyalty_password
      POSTGRES_DB: loyalty_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: loyalty_server
    restart: always
    ports:
      - "8080:8080"
    environment:
      JDBC_DATABASE_URL: jdbc:postgresql://db:5432/loyalty_db
      JDBC_DATABASE_USERNAME: loyalty_user
      JDBC_DATABASE_PASSWORD: loyalty_password
    depends_on:
      - db

  web-admin:
    build:
      context: ./web-admin
      dockerfile: Dockerfile
    container_name: loyalty_web_admin
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - server

  pgadmin:
    image: dpage/pgadmin4
    container_name: loyalty_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@loyalty.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
