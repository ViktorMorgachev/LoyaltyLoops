build:
  maxIssues: 0
  excludeCorrectable: false
  # weights влияют на счётчик только при maxIssues > 0; при 0 любой новый дефект и так валит сборку
  weights:
    complexity: 2
    LongParameterList: 1
    style: 1
    comments: 1

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true
  exclude:
    - 'DetektProgressListener'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'
    - 'FindingsReport'

output-reports:
  active: true
  exclude: []

style:
  MagicNumber:
    active: true
    # Числа в объявлениях свойств (varchar-длины в table objects, дефолты конфигов) — не магия.
    # В Composable числа — это dp/sp/weight, их выносить в константы бессмысленно
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreEnums: true
    ignoreRanges: true
    ignoreNumbers: ['-1', '0', '1', '2', '100', '1000']
    ignoreAnnotated: ['Composable', 'Preview']
  MaxLineLength:
    active: true
    maxLineLength: 140
    # Файлы локализаций — длинные строки переводов неизбежны
    excludes: ['**/i18n/**']
  WildcardImport:
    active: true
  TrailingWhitespace:
    active: true
  ReturnCount:
    active: true
    # Guard-клаузы (ранний return при невалидном входе) — идиома Kotlin, не сложность
    excludeGuardClauses: true
  ThrowsCount:
    active: true
    excludeGuardClauses: true

complexity:
  TooManyFunctions:
    active: true
    # Дефолт для классов — 11; для backend route/service-файлов этого мало
    thresholdInClasses: 20
    thresholdInObjects: 20
    thresholdInEnums: 20
  LongMethod:
    active: true
    threshold: 120
    # Экраны Compose — декларативные деревья, длина не равна сложности
    ignoreAnnotated: ['Composable']
  LongParameterList:
    active: true
    functionThreshold: 6
    # DI-конструкторы (Koin composition root) собирают много зависимостей — осознанно.
    # Composable принимают state+колбэки отдельными параметрами — это их API-стиль
    constructorThreshold: 10
    ignoreAnnotated: ['Composable']

naming:
  FunctionNaming:
    active: true
    # Composable-функции именуются с большой буквы по конвенции Compose
    ignoreAnnotated: ['Composable']

exceptions:
  # Осознанное проглатывание — только с именем ignored/expected/_ (см. TD-020)
  SwallowedException:
    active: true
    allowedExceptionNameRegex: '_|(ignore|expected).*'
  TooGenericExceptionCaught:
    active: true
    allowedExceptionNameRegex: '_|(ignore|expected).*'

comments:
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicClass:
    active: false

coroutines:
  GlobalCoroutineUsage:
    active: true

